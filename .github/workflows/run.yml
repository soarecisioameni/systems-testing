name: Run Unit Tests

# la fiecare push pe main
on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest # Sistemul de operare pe care rulează testele în cloud

    steps:
      # Pasul 1: Descarcă codul tău din GitHub în mediul de rulare
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pasul 2: Configurează limbajul (ex: Python)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Pasul 3: Instalează dependențele și framework-ul de testare
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pip install -r requirements.txt  <-- decomentează dacă ai acest fișier
          pip install pytest # Folosim pytest ca exemplu pentru teste

      # Pasul 4: Rulează efectiv testele
      - name: Run tests
        run: pytest
